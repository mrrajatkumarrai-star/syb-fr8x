<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreightOS ERP — Freight Forwarding & Operations Portal</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.sheetjs.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com https://cdn-icons-png.flaticon.com https://*.unsplash.com; connect-src 'self' https://api.emailjs.com https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://open.er-api.com;">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="./src/index.css">
</head>
<body>
  
  <!-- SPA App Wrapper -->
  <div class="app" id="app-wrapper" style="display: none;">
    <!-- Sidebar Container -->
    <div id="sidebar-mount"></div>

    <!-- Main Section -->
    <div class="main">
      <!-- Topbar Header -->
      <div class="topbar">
        <button class="btn sm" id="sb-menu-toggle" style="display:none; padding:6px; font-size:16px;">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="tb-title" id="topbar-title">Dashboard Overview</div>
        
        <!-- Search bar -->
        <div style="position:relative; display:flex; align-items:center;">
          <i class="ti ti-search" style="position:absolute; left:10px; color:var(--text-muted); font-size:14px; pointer-events:none;"></i>
          <input class="search-input" id="global-search-input" placeholder="Global Search (Press Enter)..." style="width:230px; padding-left:32px; font-size:12px;"/>
        </div>

        <!-- Theme Toggle -->
        <button class="btn" id="theme-toggle-btn" style="padding:8px; border-radius:50%; font-size:14px; display:inline-flex;" title="Toggle Theme">
          <i class="ti ti-moon"></i>
        </button>

        <!-- Notifications button -->
        <button class="btn" id="notif-bell-btn" style="padding:8px; border-radius:50%; font-size:14px; display:inline-flex; position:relative;" title="View Alerts">
          <i class="ti ti-bell"></i>
          <span class="nb" id="notif-count-btn" style="position:absolute; top:-4px; right:-4px; margin:0; padding:2px 5px; font-size:9px;">0</span>
        </button>

        <!-- User profile switcher -->
        <div style="position:relative; display:flex; align-items:center; gap:8px; border-left:1px solid var(--border); padding-left:16px; cursor:pointer;" id="user-profile-menu-btn">
          <div class="avatar" id="topbar-user-avatar" style="font-weight:600; background:var(--primary); color:#fff;">SA</div>
          <div style="font-size:11px; text-align:left; display:flex; flex-direction:column;" class="user-meta-block">
            <span style="font-weight:600; color:var(--text-main);" id="topbar-user-name">Super Admin</span>
            <span style="color:var(--text-muted); font-size:10px;" id="topbar-user-role">Super Admin</span>
          </div>
          <i class="ti ti-chevron-down" style="font-size:11px; color:var(--text-muted);"></i>
          
          <!-- Dropdown menu -->
          <div id="user-profile-dropdown" style="display:none; position:absolute; top:100%; right:0; margin-top:8px; width:200px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); z-index:1000; padding:4px;">
            <div style="padding:6px 12px; font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; border-bottom:1px solid var(--border); margin-bottom:4px;">Switch Handler Account</div>
            <div id="dropdown-users-list" style="max-height:160px; overflow-y:auto;"></div>
            <div style="border-top:1px solid var(--border); margin-top:4px; padding-top:4px;">
              <div id="dropdown-logout-btn" style="padding:8px 12px; font-size:12px; font-weight:600; color:var(--danger); cursor:pointer; display:flex; align-items:center; gap:8px; border-radius:var(--radius-sm); transition:var(--transition);">
                <i class="ti ti-logout"></i> Logout Terminal
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Dashboard / Views Content Mount -->
      <div class="content" id="panel-content">
        <!-- SPA view template mounts here -->
      </div>
    </div>
  </div>

  <!-- Shared Modal Overlays container -->
  <div id="modal-container"></div>

  <!-- Main Controller Module Script -->
  <script type="module">
    import { LockScreen } from "./src/components/lock-screen.js";
    import { Sidebar } from "./src/components/sidebar.js";
    import { Dashboard } from "./src/components/dashboard.js";
    import { Shipments } from "./src/components/shipments.js";
    import { Containers } from "./src/components/containers.js";
    import { Invoices } from "./src/components/invoices.js";
    import { Expenses } from "./src/components/expenses.js";
    import { Finance } from "./src/components/finance.js";
    import { Tasks } from "./src/components/tasks.js";
    import { Masters } from "./src/components/masters.js";
    import { Settings } from "./src/components/settings.js";
    import { Timeline } from "./src/components/timeline.js";
    import { Documents } from "./src/components/documents.js";
    import { Reports } from "./src/components/reports.js";
    import { Users } from "./src/components/users.js";
    import { Audit } from "./src/components/audit.js";
    import { Notifications } from "./src/components/notifications.js";
    import { Compass } from "./src/components/compass.js";
    import { Fr8xCP } from "./src/components/fr8x-cp.js";
    import { CustomerPortal } from "./src/components/customer-portal.js";
    import { getCollection, saveDocument } from "./src/services/db.js";
    import { showToast, showConfirm, openShipmentDetail } from "./src/services/ui.js";

    // Application state
    let activePanel = "dashboard";
    let sidebarInstance = null;
    let theme = localStorage.getItem("theme") || "light";

    // 1. Session Gateway Verification
    const lockScreen = new LockScreen(() => {
      // Unlocked callback
      initializeERPApp();
    });

    if (!lockScreen.checkSession()) {
      lockScreen.render().then(lockGate => {
        if (lockGate) {
          document.body.appendChild(lockGate);
        }
      }).catch(err => {
        console.error("Lock Screen rendering failed:", err);
      });
    } else {
      initializeERPApp();
    }

    // 2. Initialize application after unlock
    async function initializeERPApp() {
      // Check if it's customer login
      if (sessionStorage.getItem("customer_logged_in") === "true") {
        document.getElementById("app-wrapper").style.display = "flex";
        
        // Hide admin sidebar and admin topbar
        document.getElementById("sidebar-mount").style.display = "none";
        document.querySelector(".topbar").style.display = "none";
        
        // Load Customer Portal
        const mount = document.getElementById("panel-content");
        mount.style.padding = "0"; // Fill viewport
        mount.innerHTML = "";
        
        const customerPortal = new CustomerPortal(() => {
          // On logout callback
          sessionStorage.removeItem("customer_logged_in");
          sessionStorage.removeItem("customer_user_id");
          sessionStorage.removeItem("customer_company_name");
          window.location.reload();
        });
        
        const element = await customerPortal.render();
        mount.appendChild(element);
        return;
      }

      // Show main app body
      document.getElementById("app-wrapper").style.display = "flex";

      // Ensure admin sidebar and topbar are visible
      document.getElementById("sidebar-mount").style.display = "block";
      document.querySelector(".topbar").style.display = "flex";
      document.getElementById("panel-content").style.padding = "24px";

      // Set up theme
      if (theme === "dark") {
        document.body.classList.add("dark-mode");
      }
      updateThemeToggleIcon();
      
      // Update topbar profile info
      updateTopbarUserProfile();

      // Render Sidebar
      sidebarInstance = new Sidebar(activePanel, (newPanel) => {
        navToPanel(newPanel);
      });
      document.getElementById("sidebar-mount").innerHTML = "";
      document.getElementById("sidebar-mount").appendChild(sidebarInstance.render());

      // Initial Panel view load
      loadActivePanelView();

      // Setup topbar triggers
      setupTopbarEvents();
    }

    // 3. View Router / SPA Switcher
    async function loadActivePanelView() {
      const mount = document.getElementById("panel-content");
      mount.innerHTML = `
        <div style="display:flex; justify-content:center; align-items:center; height:30vh; color:var(--text-muted); flex-direction:column; gap:12px;">
          <i class="ti ti-loader animate-spin" style="font-size:28px;"></i>
          <span style="font-size:12px; font-weight:500;">Retrieving database collections...</span>
        </div>
      `;

      // Set Topbar Title
      const titles = {
        dashboard: "Dashboard Overview",
        compass: "Compass Customer Requests Monitor",
        "fr8x-cp": "FR8X-CP Customer Portal",
        shipments: "FCL / LCL Shipments",
        containers: "Lease & Detention Monitor",
        invoices: "Customer Invoicing",
        expenses: "Vendor Bills & Expenses",
        finance: "Profit & Loss ledger",
        tasks: "Operational Milestones",
        customers: "Customer Master Profile",
        vendors: "Vendor Directory",
        ports: "Ports & Airports Directory",
        shippingLines: "Carrier SCAC Agreements",
        commodities: "HS Commodity Index",
        chargeHeads: "Billing Charge Heads",
        timeline: "Milestones Event Feed",
        documents: "Shipment Attachments Log",
        reports: "CSV & Printable Reports",
        users: "Team Members Directory",
        audit: "Administrative Audit Trails",
        settings: "Global ERP Configurations"
      };

      document.getElementById("topbar-title").textContent = titles[activePanel] || "FreightOS ERP";

      try {
        let viewElement = null;

        // Instantiate matching view component
        if (activePanel === "dashboard") {
          const view = new Dashboard();
          viewElement = await view.render();
        } else if (activePanel === "compass") {
          const view = new Compass();
          viewElement = await view.render();
        } else if (activePanel === "fr8x-cp") {
          const view = new Fr8xCP();
          viewElement = await view.render();
        } else if (activePanel === "shipments") {
          const view = new Shipments(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "containers") {
          const view = new Containers(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "invoices") {
          const view = new Invoices(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "expenses") {
          const view = new Expenses(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "finance") {
          const view = new Finance();
          viewElement = await view.render();
        } else if (activePanel === "tasks") {
          const view = new Tasks(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "timeline") {
          const view = new Timeline();
          viewElement = await view.render();
        } else if (activePanel === "documents") {
          const view = new Documents(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "reports") {
          const view = new Reports();
          viewElement = await view.render();
        } else if (activePanel === "users") {
          const view = new Users(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "audit") {
          const view = new Audit();
          viewElement = await view.render();
        } else if (activePanel === "notifications") {
          const view = new Notifications(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else if (activePanel === "settings") {
          const view = new Settings(() => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        } else {
          // It's a Master table component
          const view = new Masters(activePanel, () => sidebarInstance?.updateBadges());
          viewElement = await view.render();
        }

        mount.innerHTML = "";
        mount.appendChild(viewElement);
        
        // Sync badge indicators on sidebar
        sidebarInstance?.updateBadges();

      } catch (err) {
        console.error("View rendering failed:", err);
        mount.innerHTML = `
          <div class="card" style="text-align:center; padding:40px; border-color:var(--danger);">
            <i class="ti ti-alert-triangle" style="font-size:32px; color:var(--danger); margin-bottom:12px; display:block;"></i>
            <h3 style="font-size:15px; font-weight:600; margin-bottom:4px;">Failed loading ERP workspace</h3>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">${err.message || err}</p>
            <button class="btn pr" id="panel-retry-btn">Retry View</button>
          </div>
        `;
        document.getElementById("panel-retry-btn").onclick = () => loadActivePanelView();
      }
    }

    // Nav Switch hook for components to switch panel programmatic
    window.navToPanel = function(panelName) {
      activePanel = panelName;
      if (sidebarInstance) {
        sidebarInstance.currentPanel = panelName;
        // Sync Sidebar selected styles
        const sbEl = document.getElementById("app-sidebar");
        if (sbEl) {
          sbEl.querySelectorAll(".ni").forEach(item => {
            if (item.dataset.p === panelName) {
              item.classList.add("on");
            } else {
              item.classList.remove("on");
            }
          });
        }
      }
      loadActivePanelView();
    };

    async function updateTopbarUserProfile() {
      const avatar = document.getElementById("topbar-user-avatar");
      const nameEl = document.getElementById("topbar-user-name");
      const roleEl = document.getElementById("topbar-user-role");
      
      const uName = sessionStorage.getItem("erp_user_name") || "Super Admin";
      const uRole = sessionStorage.getItem("erp_user_role") || "Super Admin";
      const initials = uName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      
      if (avatar) {
        avatar.textContent = initials;
        avatar.style.background = uRole === "Super Admin" ? "var(--info)" : "var(--primary)";
      }
      if (nameEl) nameEl.textContent = uName;
      if (roleEl) roleEl.textContent = uRole;
    }

    // 4. Topbar Header triggers
    function setupTopbarEvents() {
      // User Profile menu toggle
      const profileBtn = document.getElementById("user-profile-menu-btn");
      const profileDropdown = document.getElementById("user-profile-dropdown");
      if (profileBtn && profileDropdown) {
        profileBtn.onclick = async (e) => {
          e.stopPropagation();
          const isHidden = profileDropdown.style.display === "none";
          profileDropdown.style.display = isHidden ? "block" : "none";
          
          if (isHidden) {
            // Populate list of active team members
            const users = await getCollection("users");
            const listEl = document.getElementById("dropdown-users-list");
            if (listEl) {
              listEl.innerHTML = `
                <div style="padding:6px 12px; font-size:11px; font-weight:600; color:var(--primary); cursor:pointer; border-radius:var(--radius-sm);" class="switch-user-item" data-uid="u1" data-name="Super Admin" data-role="Super Admin">
                  Super Admin (Manager)
                </div>
                ` + users.filter(u => u.status === 'Active' && u.id !== 'u1').map(u => `
                <div style="padding:6px 12px; font-size:11px; color:var(--text-main); cursor:pointer; border-radius:var(--radius-sm);" class="switch-user-item" data-uid="${u.id}" data-name="${u.name}" data-role="${u.role || 'Operations'}">
                  ${u.name} (${u.role || 'Staff'})
                </div>
              `).join('');
              
              listEl.querySelectorAll(".switch-user-item").forEach(item => {
                item.onmouseenter = () => item.style.background = 'var(--bg-hover)';
                item.onmouseleave = () => item.style.background = 'none';
                item.onclick = (event) => {
                  event.stopPropagation();
                  sessionStorage.setItem("erp_user_id", item.dataset.uid);
                  sessionStorage.setItem("erp_user_name", item.dataset.name);
                  sessionStorage.setItem("erp_user_role", item.dataset.role);
                  profileDropdown.style.display = "none";
                  updateTopbarUserProfile();
                  loadActivePanelView();
                  showToast(`Switched active terminal user to: ${item.dataset.name}`, "success");
                };
              });
            }
          }
        };
        
        document.addEventListener("click", () => {
          profileDropdown.style.display = "none";
        });
      }

      // Logout Terminal handler
      const logoutBtn = document.getElementById("dropdown-logout-btn");
      if (logoutBtn) {
        logoutBtn.onclick = () => {
          sessionStorage.removeItem("freightos_unlocked");
          sessionStorage.removeItem("erp_user_id");
          sessionStorage.removeItem("erp_user_name");
          sessionStorage.removeItem("erp_user_role");
          window.location.reload();
        };
      }

      // Menu Toggle for responsive styles
      const menuBtn = document.getElementById("sb-menu-toggle");
      if (menuBtn) {
        menuBtn.onclick = () => {
          const sidebar = document.getElementById("app-sidebar");
          sidebar?.classList.toggle("active");
        };
      }

      // Theme toggle
      const themeBtn = document.getElementById("theme-toggle-btn");
      if (themeBtn) {
        themeBtn.onclick = () => {
          theme = theme === "light" ? "dark" : "light";
          localStorage.setItem("theme", theme);
          document.body.classList.toggle("dark-mode", theme === "dark");
          updateThemeToggleIcon();
          
          // Re-render chart elements to respect updated variables
          loadActivePanelView();
        };
      }

      // Bell Alerts panel shortcut
      const bellBtn = document.getElementById("notif-bell-btn");
      if (bellBtn) {
        bellBtn.onclick = () => {
          navToPanel("notifications");
        };
      }

      // Global Search input key handler
      const gSearch = document.getElementById("global-search-input");
      if (gSearch) {
        gSearch.onkeypress = async (e) => {
          if (e.key === 'Enter') {
            const query = gSearch.value.trim();
            if (query.length < 2) {
              showToast("Enter at least 2 characters to perform general search.", "warning");
              return;
            }

            const shipments = await getCollection("shipments");
            const customers = await getCollection("customers");
            const results = [];

            // Match Shipments
            shipments.forEach(s => {
              if ((s.jobNo + s.customer + (s.blNo || '')).toLowerCase().includes(query.toLowerCase())) {
                results.push({ type: 'Shipment', label: `${s.jobNo} — ${s.customer}`, id: s.id });
              }
            });

            // Match Clients
            customers.forEach(c => {
              if ((c.company + c.code).toLowerCase().includes(query.toLowerCase())) {
                results.push({ type: 'Customer', label: `${c.company} [${c.code}]`, id: c.id });
              }
            });

            const mc = document.getElementById('modal-container');
            if (results.length > 0) {
              mc.innerHTML = `
                <div class="modal-bg" onclick="if(event.target===this) this.remove()">
                  <div class="modal" style="width:380px; max-height:360px">
                    <div class="modal-title">Search results for "${query}"<button class="btn sm" onclick="document.getElementById('modal-container').innerHTML=''"><i class="ti ti-x" aria-hidden="true"></i></button></div>
                    <div style="display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; padding-right:4px;">
                      ${results.map(r => `
                        <div style="padding:10px; border-bottom:1px solid var(--border); cursor:pointer; border-radius:var(--radius-sm); transition:background 0.1s;" class="search-result-item" data-type="${r.type}" data-id="${r.id}">
                          <div style="font-size:12px; font-weight:600; color:var(--text-main);">${r.label}</div>
                          <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${r.type} Record</div>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                </div>`;
              
              // Hover effect styles
              mc.querySelectorAll(".search-result-item").forEach(item => {
                item.onmouseenter = () => item.style.background = 'var(--bg-hover)';
                item.onmouseleave = () => item.style.background = 'none';

                item.onclick = async () => {
                  const type = item.dataset.type;
                  const id = item.dataset.id;
                  mc.innerHTML = '';
                  gSearch.value = '';
                  
                  if (type === 'Shipment') {
                    openShipmentDetail(id);
                  } else {
                    navToPanel('customers');
                  }
                };
              });
            } else {
              showToast(`No matches found for query "${query}".`, "warning");
            }
          }
        };
      }
    }

    function updateThemeToggleIcon() {
      const icon = document.querySelector("#theme-toggle-btn i");
      if (icon) {
        icon.className = theme === "dark" ? "ti ti-sun" : "ti ti-moon";
      }
    }
  </script>
</body>
</html>
